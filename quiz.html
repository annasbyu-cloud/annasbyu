<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Climbing Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Jost', sans-serif;
      background-color: #fdf6f0;
      color: #4a3f3f;
      min-height: 100vh;
    }

    .navbar {
      background-color: #f2e0d8;
      padding: 15px 30px;
      text-align: center;
      border-bottom: 1px solid #e8c9be;
    }

    .navbar a {
      color: #7a4f4f;
      text-decoration: none;
      margin: 0 20px;
      font-size: 0.9em;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .navbar a:hover { color: #c49a8a; }

    .header {
      background-color: #f7ede7;
      color: #7a4f4f;
      text-align: center;
      padding: 60px 20px;
      border-bottom: 1px solid #e8c9be;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3em;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .header p {
      color: #a07070;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.9em;
    }

    .quiz-container {
      max-width: 700px;
      margin: 50px auto;
      padding: 40px;
      background: white;
      border-radius: 12px;
      border: 1px solid #f0d8d0;
      box-shadow: 0 2px 10px rgba(180,140,130,0.07);
    }

    .question-number {
      font-size: 0.8em;
      color: #c49a8a;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .question-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6em;
      font-weight: 400;
      color: #7a4f4f;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .progress-bar-container {
      background-color: #f0d8d0;
      border-radius: 10px;
      height: 6px;
      margin-bottom: 30px;
    }

    .progress-bar {
      background-color: #c49a8a;
      height: 6px;
      border-radius: 10px;
      transition: width 0.4s;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 25px;
    }

    .option-btn {
      padding: 14px 20px;
      border: 1px solid #e8c9be;
      border-radius: 8px;
      background: white;
      font-family: 'Jost', sans-serif;
      font-size: 0.95em;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      color: #4a3f3f;
      letter-spacing: 0.5px;
    }

    .option-btn:hover { background-color: #fdf6f0; border-color: #c49a8a; }
    .option-btn.correct { background-color: #f0f7f0; border-color: #8fbc8f; color: #3a5f3a; }
    .option-btn.incorrect { background-color: #fdf0f0; border-color: #d4908a; color: #7a3f3f; }
    .option-btn:disabled { cursor: default; }

    .feedback {
      font-size: 0.9em;
      font-weight: 500;
      margin-bottom: 20px;
      min-height: 22px;
      letter-spacing: 0.5px;
    }

    .feedback.correct { color: #6a9f6a; }
    .feedback.incorrect { color: #c47a70; }

    .next-btn {
      padding: 12px 35px;
      background-color: transparent;
      color: #7a4f4f;
      border: 1px solid #c49a8a;
      border-radius: 30px;
      font-family: 'Jost', sans-serif;
      font-size: 0.85em;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      display: none;
      transition: all 0.3s;
    }

    .next-btn:hover {
      background-color: #c49a8a;
      color: white;
    }

    .results {
      text-align: center;
      display: none;
    }

    .results h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5em;
      font-weight: 300;
      color: #7a4f4f;
      letter-spacing: 3px;
      margin-bottom: 15px;
    }

    .results .score {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4em;
      font-weight: 300;
      color: #c49a8a;
      margin: 20px 0;
    }

    .results p {
      color: #a07070;
      font-size: 1em;
      margin-bottom: 25px;
      letter-spacing: 0.5px;
    }

    .restart-btn {
      padding: 12px 35px;
      background-color: transparent;
      color: #7a4f4f;
      border: 1px solid #c49a8a;
      border-radius: 30px;
      font-family: 'Jost', sans-serif;
      font-size: 0.85em;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .restart-btn:hover {
      background-color: #c49a8a;
      color: white;
    }

    footer {
      background-color: #f2e0d8;
      color: #a07070;
      text-align: center;
      padding: 25px;
      font-size: 0.85em;
      letter-spacing: 1px;
      border-top: 1px solid #e8c9be;
      margin-top: 60px;
    }

    footer a { color: #7a4f4f; text-decoration: none; }
    footer a:hover { color: #c49a8a; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="climbing.html">Climbing</a>
  </div>

  <!-- HEADER -->
  <div class="header">
    <h1>Climbing Quiz</h1>
    <p>How much do you know about rock climbing?</p>
  </div>

  <!-- QUIZ -->
  <div class="quiz-container">

    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
    </div>

    <div id="questionArea">
      <div class="question-number" id="questionNumber">Question 1 of 10</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
    </div>

    <div class="results" id="resultsArea">
      <h2>Quiz Complete</h2>
      <div class="score" id="scoreDisplay"></div>
      <p id="resultMessage"></p>
      <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
    </div>

  </div>

  <footer>
    <p>© 2026 Anna Rowe &nbsp;|&nbsp; <a href="climbing.html">Back to Climbing Page</a></p>
  </footer>

  <script>
    const questions = [
      {
        question: "What does 'beta' mean in climbing?",
        options: ["A type of climbing shoe", "Information or advice about how to do a route", "A beginner climber", "A type of knot"],
        answer: 1
      },
      {
        question: "What is bouldering?",
        options: ["Climbing very tall mountains", "Climbing without ropes on short walls or rocks", "A type of rappelling technique", "Climbing with two ropes"],
        answer: 1
      },
      {
        question: "What does 'sending' a route mean?",
        options: ["Falling off the wall", "Texting your climbing partner", "Successfully completing a climbing route", "Belaying someone"],
        answer: 2
      },
      {
        question: "What is a 'belay' in rock climbing?",
        options: ["A type of climbing hold", "A technique to control the rope and catch a falling climber", "A climbing grade system", "A type of chalk bag"],
        answer: 1
      },
      {
        question: "Which US state is famous for Yosemite climbing?",
        options: ["Colorado", "Utah", "California", "Wyoming"],
        answer: 2
      },
      {
        question: "What does the V-scale measure?",
        options: ["The height of a climbing wall", "The difficulty of bouldering problems", "The length of a climbing rope", "The steepness of a route"],
        answer: 1
      },
      {
        question: "What is 'chalk' used for in climbing?",
        options: ["Marking routes on the wall", "Improving grip by keeping hands dry", "Cleaning climbing shoes", "Decorating holds"],
        answer: 1
      },
      {
        question: "What is a 'crimp' in climbing?",
        options: ["A type of climbing harness", "A small hold that you grip with just your fingertips", "A falling technique", "A type of carabiner"],
        answer: 1
      },
      {
        question: "What does 'on-sight' mean in climbing?",
        options: ["Climbing a route with no prior knowledge or attempts", "Watching someone else climb first", "Using a GPS on a route", "Climbing with a guide"],
        answer: 0
      },
      {
        question: "Which of these is a famous climbing destination in Utah?",
        options: ["El Capitan", "Red Rock Canyon", "Indian Creek", "Rumney"],
        answer: 2
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
      document.getElementById('questionText').textContent = q.question;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('nextBtn').style.display = 'none';

      const progress = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = progress + '%';

      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      q.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = option;
        btn.onclick = () => selectAnswer(index);
        container.appendChild(btn);
      });

      answered = false;
    }

    function selectAnswer(selectedIndex) {
      if (answered) return;
      answered = true;

      const q = questions[currentQuestion];
      const buttons = document.querySelectorAll('.option-btn');
      const feedback = document.getElementById('feedback');

      buttons.forEach(btn => btn.disabled = true);

      if (selectedIndex === q.answer) {
        buttons[selectedIndex].classList.add('correct');
        feedback.textContent = '✓ Correct! Great job!';
        feedback.className = 'feedback correct';
        score++;
      } else {
        buttons[selectedIndex].classList.add('incorrect');
        buttons[q.answer].classList.add('correct');
        feedback.textContent = `✗ Not quite! The correct answer was: "${q.options[q.answer]}"`;
        feedback.className = 'feedback incorrect';
      }

      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      document.getElementById('questionArea').style.display = 'none';
      document.getElementById('resultsArea').style.display = 'block';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('scoreDisplay').textContent = `${score} / ${questions.length}`;

      let message = '';
      if (score === 10) message = "Perfect score! You're a climbing expert! 🏆";
      else if (score >= 7) message = "Great job! You really know your climbing!";
      else if (score >= 4) message = "Not bad! Keep climbing and learning!";
      else message = "Keep practicing — both the climbing and the trivia!";

      document.getElementById('resultMessage').textContent = message;
    }

    function restartQuiz() {
      currentQuestion = 0;
      score = 0;
      document.getElementById('questionArea').style.display = 'block';
      document.getElementById('resultsArea').style.display = 'none';
      loadQuestion();
    }

    loadQuestion();
  </script>

</body>
</html>
